<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <!-- Background -->
  <rect width="500" height="300" fill="#fff1e6" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="44" fill="#eddcd2" rx="8"/>
  <rect y="36" width="500" height="8" fill="#eddcd2"/>
  <text x="250" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">K2-V2 · 360-Open LLM</text>

  <!-- Training pipeline diagram -->
  <!-- Stage boxes -->
  <!-- Stage 1: Data -->
  <rect x="20"  y="58" width="90" height="52" fill="#fde2e4" rx="6" stroke="#fad2e1" stroke-width="1.5"/>
  <text x="65"  y="79"  font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">Data</text>
  <text x="65"  y="93"  font-family="Arial" font-size="9"  fill="#2c3e50" text-anchor="middle">Processing</text>
  <text x="65"  y="105" font-family="Arial" font-size="8"  fill="#7f8c8d" text-anchor="middle">360-Open</text>

  <!-- Arrow -->
  <polygon points="117,82 130,87 117,92" fill="#bcd4e6"/>
  <line x1="110" y1="87" x2="130" y2="87" stroke="#bcd4e6" stroke-width="2"/>

  <!-- Stage 2: Pre-training -->
  <rect x="133" y="58" width="90" height="52" fill="#c5dedd" rx="6" stroke="#99c1de" stroke-width="1.5"/>
  <text x="178" y="79"  font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">Pre-train</text>
  <text x="178" y="93"  font-family="Arial" font-size="9"  fill="#2c3e50" text-anchor="middle">70B Params</text>
  <text x="178" y="105" font-family="Arial" font-size="8"  fill="#7f8c8d" text-anchor="middle">80 Layers</text>

  <!-- Arrow -->
  <polygon points="230,82 243,87 230,92" fill="#bcd4e6"/>
  <line x1="223" y1="87" x2="243" y2="87" stroke="#bcd4e6" stroke-width="2"/>

  <!-- Stage 3: Mid-training -->
  <rect x="246" y="58" width="90" height="52" fill="#dbe7e4" rx="6" stroke="#bcd4e6" stroke-width="1.5"/>
  <text x="291" y="79"  font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">Annealing</text>
  <text x="291" y="93"  font-family="Arial" font-size="9"  fill="#2c3e50" text-anchor="middle">Mid-training</text>
  <text x="291" y="105" font-family="Arial" font-size="8"  fill="#7f8c8d" text-anchor="middle">Reasoning↑</text>

  <!-- Arrow -->
  <polygon points="343,82 356,87 343,92" fill="#bcd4e6"/>
  <line x1="336" y1="87" x2="356" y2="87" stroke="#bcd4e6" stroke-width="2"/>

  <!-- Stage 4: SFT -->
  <rect x="359" y="58" width="90" height="52" fill="#eddcd2" rx="6" stroke="#fad2e1" stroke-width="1.5"/>
  <text x="404" y="79"  font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">SFT</text>
  <text x="404" y="93"  font-family="Arial" font-size="9"  fill="#2c3e50" text-anchor="middle">Instruct</text>
  <text x="404" y="105" font-family="Arial" font-size="8"  fill="#7f8c8d" text-anchor="middle">Fine-tune</text>

  <!-- Capabilities section -->
  <rect x="20" y="125" width="460" height="60" fill="#f0efeb" rx="6"/>
  <text x="250" y="145" font-family="Arial" font-size="11" fill="#2c3e50" text-anchor="middle" font-weight="bold">Key Capabilities</text>

  <!-- Capability chips -->
  <rect x="35"  y="153" width="80" height="20" fill="#c5dedd" rx="10"/>
  <text x="75"  y="167" font-family="Arial" font-size="9" fill="#2c3e50" text-anchor="middle">Math Reasoning</text>
  <rect x="125" y="153" width="80" height="20" fill="#dbe7e4" rx="10"/>
  <text x="165" y="167" font-family="Arial" font-size="9" fill="#2c3e50" text-anchor="middle">Long Context</text>
  <rect x="215" y="153" width="70" height="20" fill="#bcd4e6" rx="10"/>
  <text x="250" y="167" font-family="Arial" font-size="9" fill="#2c3e50" text-anchor="middle">Tool Use</text>
  <rect x="295" y="153" width="80" height="20" fill="#c5dedd" rx="10"/>
  <text x="335" y="167" font-family="Arial" font-size="9" fill="#2c3e50" text-anchor="middle">Knowledge Q&amp;A</text>
  <rect x="385" y="153" width="75" height="20" fill="#dbe7e4" rx="10"/>
  <text x="423" y="167" font-family="Arial" font-size="9" fill="#2c3e50" text-anchor="middle">Agentic Tasks</text>

  <!-- Benchmark comparison -->
  <rect x="20" y="198" width="460" height="72" fill="#dbe7e4" rx="6"/>
  <text x="250" y="216" font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">Benchmark Performance</text>
  <!-- Bars -->
  <text x="32" y="234" font-family="Arial" font-size="9" fill="#2c3e50">K2-V2 (70B)</text>
  <rect x="110" y="225" width="190" height="12" fill="#99c1de" rx="3"/>
  <text x="306" y="235" font-family="Arial" font-size="9" fill="#2c3e50">★ Strongest Open</text>

  <text x="32" y="252" font-family="Arial" font-size="9" fill="#2c3e50">Qwen2.5-72B</text>
  <rect x="110" y="243" width="155" height="12" fill="#bcd4e6" rx="3"/>

  <text x="32" y="270" font-family="Arial" font-size="9" fill="#2c3e50">Qwen3-235B</text>
  <rect x="110" y="261" width="175" height="12" fill="#d6e2e9" rx="3"/>

  <!-- Footer -->
  <text x="250" y="290" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle" font-style="italic">LLM360 Technical Report · December 2024</text>
</svg>
