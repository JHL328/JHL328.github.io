<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <!-- Background -->
  <rect width="500" height="300" fill="#d6e2e9" rx="8"/>
  <!-- Header -->
  <rect width="500" height="44" fill="#bcd4e6" rx="8"/>
  <rect y="36" width="500" height="8" fill="#bcd4e6"/>
  <text x="250" y="28" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Mora · Multi-Agent Video Generation</text>

  <!-- Text Input box -->
  <rect x="20" y="56" width="100" height="36" fill="#fff1e6" rx="5" stroke="#99c1de" stroke-width="1.5"/>
  <text x="70" y="69" font-family="Arial" font-size="9"  fill="#2c3e50" text-anchor="middle" font-weight="bold">Text Prompt</text>
  <text x="70" y="83" font-family="Arial" font-size="8"  fill="#7f8c8d" text-anchor="middle">"A sunrise..."</text>

  <!-- Arrow to orchestrator -->
  <line x1="120" y1="74" x2="148" y2="74" stroke="#99c1de" stroke-width="2"/>
  <polygon points="145,70 155,74 145,78" fill="#99c1de"/>

  <!-- Orchestrator box -->
  <rect x="155" y="52" width="95" height="44" fill="#c5dedd" rx="5" stroke="#99c1de" stroke-width="1.5"/>
  <text x="203" y="71" font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle" font-weight="bold">Orchestrator</text>
  <text x="203" y="85" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle">LLM Planner</text>

  <!-- Arrows from orchestrator to agents -->
  <line x1="250" y1="74" x2="278" y2="74" stroke="#99c1de" stroke-width="1.5"/>
  <polygon points="275,70 285,74 275,78" fill="#99c1de"/>

  <!-- Agent 1: Text2Video -->
  <rect x="286" y="52" width="88" height="30" fill="#fde2e4" rx="4" stroke="#fad2e1" stroke-width="1"/>
  <text x="330" y="66"  font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle" font-weight="bold">Text2Video</text>
  <text x="330" y="78"  font-family="Arial" font-size="7.5" fill="#7f8c8d" text-anchor="middle">Agent 1</text>

  <!-- Agent 2: Img2Video -->
  <rect x="286" y="88" width="88" height="30" fill="#eddcd2" rx="4" stroke="#fad2e1" stroke-width="1"/>
  <text x="330" y="102" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle" font-weight="bold">Img2Video</text>
  <text x="330" y="114" font-family="Arial" font-size="7.5" fill="#7f8c8d" text-anchor="middle">Agent 2</text>

  <!-- Agent 3: VideoEdit -->
  <rect x="286" y="124" width="88" height="30" fill="#dbe7e4" rx="4" stroke="#bcd4e6" stroke-width="1"/>
  <text x="330" y="138" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle" font-weight="bold">VideoEdit</text>
  <text x="330" y="150" font-family="Arial" font-size="7.5" fill="#7f8c8d" text-anchor="middle">Agent 3</text>

  <!-- Output arrow -->
  <line x1="374" y1="88" x2="404" y2="88" stroke="#99c1de" stroke-width="2"/>
  <polygon points="401,84 411,88 401,92" fill="#99c1de"/>

  <!-- Output video frames -->
  <rect x="412" y="56" width="68" height="72" fill="#fff1e6" rx="5" stroke="#bcd4e6" stroke-width="1.5"/>
  <rect x="418" y="62" width="55" height="34" fill="#bcd4e6" rx="3"/>
  <text x="446" y="84" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">Video</text>
  <rect x="418" y="100" width="55" height="22" fill="#dbe7e4" rx="3"/>
  <text x="446" y="115" font-family="Arial" font-size="7.5" fill="#2c3e50" text-anchor="middle">Output</text>

  <!-- Supported tasks section -->
  <rect x="20" y="168" width="460" height="100" fill="#f0efeb" rx="6"/>
  <text x="250" y="186" font-family="Arial" font-size="11" fill="#2c3e50" text-anchor="middle" font-weight="bold">Supported Tasks</text>

  <!-- Task chips row 1 -->
  <rect x="35"  y="194" width="100" height="20" fill="#99c1de" rx="10"/>
  <text x="85"  y="208" font-family="Arial" font-size="8.5" fill="#fff" text-anchor="middle">Text-to-Video</text>

  <rect x="145" y="194" width="110" height="20" fill="#bcd4e6" rx="10"/>
  <text x="200" y="208" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle">Image-to-Video</text>

  <rect x="265" y="194" width="100" height="20" fill="#c5dedd" rx="10"/>
  <text x="315" y="208" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle">Video Editing</text>

  <rect x="375" y="194" width="90" height="20" fill="#dbe7e4" rx="10"/>
  <text x="420" y="208" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle">World Sim.</text>

  <!-- Task chips row 2 -->
  <rect x="80"  y="222" width="110" height="20" fill="#eddcd2" rx="10"/>
  <text x="135" y="236" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle">Video Extension</text>

  <rect x="200" y="222" width="110" height="20" fill="#fde2e4" rx="10"/>
  <text x="255" y="236" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle">Video Connect</text>

  <rect x="320" y="222" width="90" height="20" fill="#bcd4e6" rx="10"/>
  <text x="365" y="236" font-family="Arial" font-size="8.5" fill="#2c3e50" text-anchor="middle">V2V Transfer</text>

  <!-- Sora comparison note -->
  <rect x="20" y="276" width="460" height="16" fill="#bcd4e6" rx="4"/>
  <text x="250" y="288" font-family="Arial" font-size="9" fill="#2c3e50" text-anchor="middle" font-style="italic">Replicates Sora-like generalist video generation · Open-source · arXiv March 2024</text>
</svg>
